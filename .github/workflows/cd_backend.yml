## Build the docker image
## Deploy it to docker hub 
## SSH into our Vm and start the new image 


name: Deploy the Backend

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t mdtoshif/todo-app-backend:v1 -f ./docker/Dockerfile.backend .

    - name: Push Docker image to Docker Hub
      run: docker push mdtoshif/todo-app-backend:v1

      ## Deploy to vm 
    # - name: Deploy to the VM
    #   run: |
    #     echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
    #     chmod 700 /home/runner/ssh_key
    #     ssh -o StrictHostKeyChecking=no -i ~/ssh_key root@52.70.103.65 -t "docker stop user_backend_1 && docker run --name user_backend_1 -d -p 8080:8080 mdtoshif/todo-app-backend-backend:v1"


    - name: Deploy to VM
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
        chmod 600 ~/ssh_key

        ssh -o StrictHostKeyChecking=no \
        -i ~/ssh_key \
        ubuntu@52.70.103.65 << 'EOF'

        docker pull mdtoshif/todo-app-backend:v1

        docker stop user_backend || true
        docker rm user_backend || true

        docker run -d \
            --name user_backend \
            -p 8080:8080 \
            mdtoshif/todo-app-backend:v1

        EOF
